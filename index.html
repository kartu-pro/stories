<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library | Storyline</title>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='25' fill='%231e293b'/><text x='50%' y='50%' dominant-baseline='central' text-anchor='middle' font-family='sans-serif' font-size='60' font-weight='bold' fill='white'>SL</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/persist@3.x.x/dist/cdn.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/collapse@3.x.x/dist/cdn.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/lucide@1.11.0/dist/umd/lucide.min.js"></script>
    <link rel="preconnect" href="https://script.google.com">
    <link rel="preconnect" href="https://script.googleusercontent.com">

    <style>
        [x-cloak] {
            display: none !important;
        }

        /* Custom range slider styling */
        input[type=range] {
            accent-color: #3b82f6;
        }

        /* Hide scrollbar for badge list */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>

<body class="bg-slate-100 text-slate-800 antialiased min-h-screen pb-20">

    <div x-data="libraryApp" class="max-w-2xl mx-auto p-4 relative">

        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-2 mb-4 sticky top-4 z-20">
            <div class="flex items-center gap-2">
                <div class="flex-1 flex items-center bg-slate-100 rounded-xl px-3 py-2">
                    <i data-lucide="search" class="w-5 h-5 text-slate-400"></i>
                    <input type="text" x-model="searchQuery"
                        class="bg-transparent border-none outline-none w-full ml-2 text-sm" placeholder="...">
                    <button x-show="searchQuery" @click="searchQuery = ''" class="text-slate-400 hover:text-slate-600">
                        <i data-lucide="x-circle" class="w-4 h-4"></i>
                    </button>
                </div>
                <button @click="showAdvanced = !showAdvanced" class="p-2 rounded-xl transition-colors relative"
                    :class="showAdvanced ? 'bg-blue-600 text-white' : 'bg-slate-100 text-slate-600 hover:bg-slate-200'">
                    <i data-lucide="sliders-horizontal" class="w-5 h-5"></i>
                    <div x-show="isFiltered" x-cloak
                        class="absolute -top-1 -right-1 w-3 h-3 bg-red-500 border-2 border-white rounded-full"></div>
                </button>
            </div>

            <div x-show="showAdvanced" x-collapse x-cloak>
                <div class="pt-4 pb-2 px-2 border-t border-slate-100 mt-2">
                    <div class="grid grid-cols-[auto_1fr] gap-x-4 gap-y-6 items-center">

                        <div class="flex justify-center">
                            <i data-lucide="arrow-down-wide-narrow" class="w-5 h-5 text-slate-400"></i>
                        </div>
                        <div class="flex bg-slate-100 p-1 rounded-xl">
                            <button @click="sortBy = 'recent'"
                                :class="sortBy === 'recent' ? 'bg-white shadow-sm text-blue-600' : 'text-slate-500'"
                                class="flex-1 py-1.5 rounded-lg flex justify-center items-center transition-all">
                                <i data-lucide="file-plus" class="w-4 h-4"></i>
                            </button>

                            <button @click="sortBy = 'views'"
                                :class="sortBy === 'views' ? 'bg-white shadow-sm text-blue-600' : 'text-slate-500'"
                                class="flex-1 py-1.5 rounded-lg flex justify-center items-center transition-all">
                                <i data-lucide="eye" class="w-4 h-4"></i>
                            </button>

                            <button @click="sortBy = 'likes'"
                                :class="sortBy === 'likes' ? 'bg-white shadow-sm text-amber-500' : 'text-slate-500'"
                                class="flex-1 py-1.5 rounded-lg flex justify-center items-center transition-all">
                                <i data-lucide="thumbs-up" class="w-4 h-4"></i>
                            </button>

                            <button @click="sortBy = 'favorites'"
                                :class="sortBy === 'favorites' ? 'bg-white shadow-sm text-red-500' : 'text-slate-500'"
                                class="flex-1 py-1.5 rounded-lg flex justify-center items-center transition-all">
                                <i data-lucide="heart" class="w-4 h-4"></i>
                            </button>
                        </div>

                        <div class="flex justify-center">
                            <i data-lucide="funnel" class="w-5 h-5 text-slate-400"></i>
                        </div>
                        <div class="flex bg-slate-100 p-1 rounded-xl">
                            <button @click="premiumOnly = !premiumOnly"
                                :class="premiumOnly ? 'bg-white shadow-sm text-amber-500' : 'text-slate-500'"
                                class="flex-1 py-1.5 rounded-lg flex justify-center items-center transition-all">
                                <i data-lucide="crown" class="w-4 h-4"></i>
                            </button>

                            <button @click="audioOnly = !audioOnly"
                                :class="audioOnly ? 'bg-white shadow-sm text-blue-600' : 'text-slate-500'"
                                class="flex-1 py-1.5 rounded-lg flex justify-center items-center transition-all">
                                <i data-lucide="headphones" class="w-4 h-4"></i>
                            </button>

                            <button @click="imagesOnly = !imagesOnly"
                                :class="imagesOnly ? 'bg-white shadow-sm text-emerald-400' : 'text-slate-500'"
                                class="flex-1 py-1.5 rounded-lg flex justify-center items-center transition-all">
                                <i data-lucide="image" class="w-4 h-4"></i>
                            </button>

                            <button @click="unreadOnly = !unreadOnly"
                                :class="unreadOnly ? 'bg-white shadow-sm text-purple-600' : 'text-slate-500'"
                                class="flex-1 py-1.5 rounded-lg flex justify-center items-center transition-all">
                                <i data-lucide="book-open" class="w-4 h-4"></i>
                            </button>
                        </div>

                        <div class="flex justify-center">
                            <i data-lucide="file-text" class="w-5 h-5 text-slate-400"></i>
                        </div>
                        <div class="px-2">

                            <div class="relative h-1.5 flex items-center bg-slate-100 rounded-full">
                                <div class="absolute h-full bg-blue-600/20 rounded-full" :style="`left: ${(minPages/absoluteMaxPages)*100}%; 
                     right: ${100 - ((maxPages || absoluteMaxPages)/absoluteMaxPages)*100}%` ">
                                </div>

                                <input type="range" min="0" :max="absoluteMaxPages" x-model="minPages"
                                    class="absolute w-full appearance-none bg-transparent pointer-events-none z-30 touch-none 
            [&::-webkit-slider-thumb]:pointer-events-auto [&::-webkit-slider-thumb]:w-8 [&::-webkit-slider-thumb]:h-8 [&::-webkit-slider-thumb]:appearance-none [&::-webkit-slider-thumb]:bg-transparent">

                                <input type="range" min="0" :max="absoluteMaxPages" x-model="maxPages"
                                    class="absolute w-full appearance-none bg-transparent pointer-events-none z-30 touch-none 
            [&::-webkit-slider-thumb]:pointer-events-auto [&::-webkit-slider-thumb]:w-8 [&::-webkit-slider-thumb]:h-8 [&::-webkit-slider-thumb]:appearance-none [&::-webkit-slider-thumb]:bg-transparent">

                                <div class="absolute pointer-events-none z-20 -translate-x-1/2 w-5 h-5 rounded-full border-2 border-blue-600 bg-white flex items-center justify-center shadow-sm"
                                    :style="`left: ${(minPages/absoluteMaxPages)*100}%` ">
                                    <span class="text-[10px] font-bold text-blue-600" x-text="minPages"></span>
                                </div>

                                <div class="absolute pointer-events-none z-20 -translate-x-1/2 w-5 h-5 rounded-full border-2 border-blue-600 bg-white flex items-center justify-center shadow-sm"
                                    :style="`left: ${(maxPages/absoluteMaxPages)*100}%` ">
                                    <span class="text-[10px] font-bold text-blue-600" x-text="maxPages"></span>
                                </div>
                            </div>
                        </div>

                    </div>

                    <div class="mt-8 flex gap-3">
                        <button @click="resetFilters()"
                            class="flex-1 p-3 rounded-xl bg-slate-100 text-slate-500 hover:bg-slate-200 hover:text-red-500 transition-colors flex justify-center items-center">
                            <i data-lucide="x" class="w-6 h-6"></i>
                        </button>

                        <button @click="showAdvanced = false"
                            class="flex-[2] p-3 bg-slate-900 text-white rounded-xl shadow-xl shadow-slate-200 flex justify-center items-center hover:bg-slate-800 transition-all active:scale-95">
                            <i data-lucide="chevron-right" class="w-6 h-6"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div class="space-y-4">
            <template x-for="story in filteredStories" :key="story.uuid">

                <div @click="window.location.href = 'story.html?id=' + story.uuid"
                    class="flex flex-row overflow-hidden bg-white rounded-2xl shadow-sm border border-slate-200 cursor-pointer hover:shadow-md transition-shadow h-40 relative group">
                    <div class="w-1/3 relative bg-slate-200 flex-shrink-0">
                        <div x-show="story.cost > 0"
                            class="absolute top-0 right-0 bg-amber-400 text-white p-1.5 rounded-bl-xl z-10 shadow-sm">
                            <i data-lucide="crown" class="w-3.5 h-3.5"></i>
                        </div>
                        <!--
                        <div x-show="story.cost == 0"
                            class="absolute top-0 right-0 bg-emerald-500 text-white px-2 py-1 text-[10px] font-bold uppercase rounded-bl-xl z-10 shadow-sm">
                            Free
                        </div>
                        -->
                        <img :src="story.imageUrl || 'https://placehold.co/400x600/e2e8f0/64748b?text=+'" alt=""
                            class="w-full h-full object-cover">
                    </div>

                    <div class="w-2/3 p-3 flex flex-col justify-between">

                        <div>
                            <h3 x-text="story.title" class="font-bold text-slate-800 leading-tight line-clamp-1 mb-1">
                            </h3>
                            <a @click.stop :href="'/authors/' + story.author"
                                class="text-xs text-blue-500 hover:text-blue-700 hover:underline inline-flex items-center gap-0.5">
                                @<span x-text="story.author"></span>
                            </a>

                            <div class="flex gap-1.5 mt-2 overflow-x-auto no-scrollbar pb-1">
                                <template x-for="focus in story.focuses" :key="focus">
                                    <button @click.stop="setFocus(focus)" x-text="focus"
                                        class="text-[10px] uppercase tracking-wider font-semibold bg-slate-100 text-slate-600 rounded-md px-2 py-1 whitespace-nowrap hover:bg-slate-200 transition-colors"></button>
                                </template>
                            </div>
                        </div>

                        <div
                            class="flex items-center justify-between mt-2 pt-2 border-t border-slate-50 text-slate-400">
                            <div class="flex gap-3">
                                <div class="flex items-center gap-1 text-xs">
                                    <i data-lucide="eye" class="w-3.5 h-3.5"></i>
                                    <span x-text="story.views" class="transition-opacity duration-500"
                                        :class="softUpdating ? 'opacity-0' : 'opacity-100'"></span>
                                </div>
                                <div class="flex items-center gap-1 text-xs">
                                    <i data-lucide="thumbs-up" class="w-3.5 h-3.5"
                                        :class="story.likes > 0 ? 'text-amber-400' : ''"></i>
                                    <span x-text="story.likes" class="transition-opacity duration-500"
                                        :class="softUpdating ? 'opacity-0' : 'opacity-100'"></span>
                                </div>
                                <div class="flex items-center gap-1 text-xs">
                                    <i data-lucide="heart" class="w-3.5 h-3.5"
                                        :class="story.favorites > 0 ? 'text-red-400' : ''"></i>
                                    <span x-text="story.favorites" class="transition-opacity duration-500"
                                        :class="softUpdating ? 'opacity-0' : 'opacity-100'"></span>
                                </div>
                                <!--
                                <div class="flex items-center gap-1 text-xs">
                                    <i data-lucide="file-text" class="w-3.5 h-3.5"></i>
                                    <span x-text="story.pages" class="transition-opacity duration-500"
                                        :class="softUpdating ? 'opacity-0' : 'opacity-100'"></span>
                                </div>
                                -->
                            </div>

                            <div class="flex gap-1.5">
                                <i data-lucide="headphones" class="w-3.5 h-3.5 transition-colors"
                                    :class="story.hasAudio ? 'text-blue-400' : 'text-slate-300 opacity-80'">
                                </i>

                                <i data-lucide="image" class="w-3.5 h-3.5 transition-colors"
                                    :class="story.hasImages ? 'text-emerald-400' : 'text-slate-300 opacity-80'">
                                </i>
                            </div>
                        </div>

                    </div>
                </div>
            </template>

            <div x-show="filteredStories.length === 0" style="display: none;"
                class="py-10 text-center text-slate-400 flex flex-col items-center">
                <i data-lucide="ghost" class="w-10 h-10 mb-2 opacity-50"></i>
            </div>
        </div>

        <button x-show="showUpdateTooltip" x-transition.opacity.duration.300ms @click="applyUpdates()"
            style="display: none;"
            class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-blue-600 text-white shadow-xl shadow-blue-600/20 rounded-full px-4 py-3 flex items-center gap-2 hover:bg-blue-700 transition-colors z-50">
            <i data-lucide="refresh-cw" class="w-4 h-4 animate-spin-slow"></i>
        </button>

    </div>

    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.data('libraryApp', () => ({

                // Story Data State
                cachedStories: Alpine.$persist([]).as('library_stories'),
                lastFetch: Alpine.$persist(0).as('library_fetch_timestamp'),
                liveStories: [],
                pendingStories: [],
                showUpdateTooltip: false,
                softUpdating: false,

                async fetchData() {
                    const fetchTTL = 30 // seconds
                    const now = Math.floor(Date.now() / 1000);
                    const secondsSinceLastFetch = now - this.lastFetch;
                    // Optimization: Skip if within cooldown window
                    if (this.cachedStories.length > 0 && secondsSinceLastFetch < fetchTTL) {
                        return;
                    }
                    try {
                        const url = 'https://script.google.com/macros/s/AKfycbxr2lLYd4-M8mmc7IAmkwoSvYdIT13O3J_JJlB420-5C3v8nyPmy8aAqA5KlACcl6o9/exec?action=getStories';
                        const res = await fetch(url);
                        let data = await res.json();
                        const fetchedStories = Array.isArray(data) ? data : (data.data || []);

                        this.lastFetch = now;
                        this.processUpdates(fetchedStories);
                    } catch (e) {
                        console.error('API Fetch failed', e);
                    }
                },

                processUpdates(newStories) {
                    // 1. Always update the persistent cache immediately
                    this.cachedStories = newStories;

                    // 2. If it's the first load of the session
                    if (this.liveStories.length === 0) {
                        this.liveStories = [...newStories];
                        return;
                    }

                    // 3. Compare IDs for structural changes
                    const currentIds = this.liveStories.map(s => s.uuid).sort().join(',');
                    const newIds = newStories.map(s => s.uuid).sort().join(',');

                    if (currentIds !== newIds) {
                        // Structural change: Queue the update
                        this.pendingStories = newStories;
                        this.showUpdateTooltip = true;
                    } else {
                        // Soft update: Content changed, but IDs are the same
                        this.softUpdating = true;
                        setTimeout(() => {
                            // Map the new data onto the existing array to maintain references if needed
                            this.liveStories = [...this.cachedStories];
                            this.softUpdating = false;
                        }, 300);
                    }
                },

                applyUpdates() {
                    // Set live data to the pending data we stored earlier
                    this.liveStories = [...this.pendingStories];

                    // Reset state
                    this.pendingStories = [];
                    this.showUpdateTooltip = false;
                    window.scrollTo({top: 0, behavior: 'smooth'});
                },



                // Filter State
                get absoluteMaxPages() {
                    if (this.liveStories.length === 0) return 1; // Fallback
                    return Math.max(...this.liveStories.map(s => s.pages || 0));
                },
                searchQuery: '',
                premiumOnly: false,
                audioOnly: false,
                imagesOnly: false,
                unreadOnly: false,
                minPages: 0,
                maxPages: this.absoluteMaxPages,
                sortBy: 'likes',
                showAdvanced: false,

                resetFilters() {
                    this.searchQuery = '';
                    this.premiumOnly = false;
                    this.audioOnly = false;
                    this.imagesOnly = false;
                    this.unreadOnly = false;
                    this.minPages = 0;
                    this.maxPages = this.absoluteMaxPages;
                    this.sortBy = 'recent';
                },
                get isFiltered() {
                    return this.searchQuery || this.premiumOnly || this.audioOnly ||
                        this.imagesOnly || this.unreadOnly || this.minPages != 0 || this.maxPages != this.absoluteMaxPages;
                },
                get allFocuses() {
                    const focuses = this.liveStories.flatMap(s => s.focuses || []);
                    return [...new Set(focuses)].sort();
                },

                get filteredStories() {
                    let result = this.liveStories.filter(story => {
                        // Keyword search (title, author, focuses)
                        if (this.searchQuery) {
                            const q = this.searchQuery.toLowerCase();
                            const matchesTitle = story.title?.toLowerCase().includes(q);
                            const matchesAuthor = story.author?.toLowerCase().includes(q);
                            const matchesFocus = story.focuses?.some(f => f.toLowerCase().includes(q));
                            if (!matchesTitle && !matchesAuthor && !matchesFocus) return false;
                        }

                        if (this.premiumOnly && story.cost <= 0) return false;
                        if (this.audioOnly && !story.hasAudio) return false;
                        if (this.imagesOnly && !story.hasImages) return false;
                        if (this.unreadOnly && story.read) return false;
                        if (story.pages < this.minPages || story.pages > this.maxPages) return false;

                        return true;
                    });

                    // Advanced Sorting
                    return result.sort((a, b) => {
                        if (this.sortBy === 'views') return b.views - a.views;
                        if (this.sortBy === 'likes') return b.likes - a.likes;
                        if (this.sortBy === 'favorites') return b.favorites - a.favorites;
                        return 0; // 'recent' assumes array is already sorted or uses ID
                    });

                    return result;
                },
                updateUrl(key, value) {
                    const url = new URL(window.location);
                    if (value) {
                        url.searchParams.set(key, value);
                    } else {
                        url.searchParams.delete(key);
                    }
                    window.history.replaceState({}, '', url);
                },
                setFocus(f) {
                    this.searchQuery = f;
                    window.scrollTo({top: 0, behavior: 'smooth'});
                },




                init() {
                    // Load Cache immediately
                    this.liveStories = [...this.cachedStories];
                    this.$nextTick(() => lucide.createIcons());

                    // Parse initial URL Params
                    const params = new URLSearchParams(window.location.search);
                    this.searchQuery = params.get('q') || '';
                    this.sortBy = params.get('sort') || 'recent';
                    this.premiumOnly = params.get('premiumOnly') === 'true';
                    this.audioOnly = params.get('audioOnly') === 'true';
                    this.imagesOnly = params.get('imagesOnly') === 'true';
                    this.unreadOnly = params.get('unreadOnly') === 'true';

                    this.minPages = Number(params.get('minPages')) || 0;
                    this.maxPages = Number(params.get('maxPages')) || this.absoluteMaxPages;

                    Alpine.effect(() => {
                        // Register dependencies by "touching" them
                        this.filteredStories;
                        this.showAdvanced;
                        this.focusFilter;

                        // Wait for DOM to update, then swap icons
                        this.$nextTick(() => {
                            lucide.createIcons();
                        });
                    });

                    // Watchers to seamlessly update URL without page refresh
                    this.$watch('searchQuery', val => this.updateUrl('q', val));
                    this.$watch('sortBy', val => this.updateUrl('sort', val !== 'recent' ? val : ''));
                    this.$watch('premiumOnly', val => this.updateUrl('premiumOnly', val ? 'true' : ''));
                    this.$watch('audioOnly', val => this.updateUrl('audioOnly', val ? 'true' : ''));
                    this.$watch('imagesOnly', val => this.updateUrl('imagesOnly', val ? 'true' : ''));
                    this.$watch('unreadOnly', val => this.updateUrl('unreadOnly', val ? 'true' : ''));
                    this.$watch('minPages', val => this.updateUrl('minPages', val > 0 ? val : ''));
                    this.$watch('maxPages', val => this.updateUrl('maxPages', val < this.absoluteMaxPages ? val : ''));

                    // Handle back/forward browser navigation
                    window.addEventListener('popstate', () => {
                        const p = new URLSearchParams(window.location.search);
                        this.searchQuery = p.get('q') || '';
                        this.sortBy = p.get('sort') || 'recent';
                        this.premiumOnly = p.get('premiumOnly') === 'true';
                        this.audioOnly = p.get('audioOnly') === 'true';
                        this.imagesOnly = p.get('imagesOnly') === 'true';
                        this.unreadOnly = p.get('unreadOnly') === 'true';
                        this.minPages = Number(p.get('minPages')) || 0;
                        this.maxPages = Number(p.get('maxPages')) || this.absoluteMaxPages;
                    });

                    // Fetch fresh data in background on idle
                    window.addEventListener('load', () => {
                        // requestIdleCallback waits for the browser to be "bored"
                        if ('requestIdleCallback' in window) {
                            requestIdleCallback(() => this.fetchData());
                        } else {
                            // Fallback for older browsers
                            setTimeout(() => this.fetchData(), 3000);
                        }
                    });
                },
            }));
        });
    </script>
</body>

</html>
