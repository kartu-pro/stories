<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Storyline</title>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50 p-8">

    <div x-data="{ 
            stories: [], 
            loading: true,
            apiUrl: 'https://script.google.com/macros/s/AKfycbxr2lLYd4-M8mmc7IAmkwoSvYdIT13O3J_JJlB420-5C3v8nyPmy8aAqA5KlACcl6o9/exec?action=getStories'
        }" x-init="
            fetch(apiUrl)
                .then(res => res.json())
                .then(data => { 
                    stories = data; 
                    loading = false; 
                })
        " class="max-w-2xl mx-auto">
        <h1 class="text-3xl font-bold mb-6 text-gray-800">My Stories</h1>

        <template x-if="loading">
            <p class="text-gray-500 animate-pulse">Fetching stories...</p>
        </template>

        <div class="grid gap-4">
            <template x-for="story in stories" :key="story.uuid">
                <a :href="'story.html?id=' + story.uuid" class="block p-6 bg-white rounded-lg border border-gray-200 shadow-sm hover:border-blue-400
                    hover:shadow-md transition-all group">
                    <div class="flex justify-between items-center">
                        <h2 class="text-xl font-semibold text-gray-700 group-hover:text-blue-600" x-text="story.title">
                        </h2>

                        <span class="px-2 py-1 text-xs font-bold uppercase rounded"
                            :class="story.read ? 'bg-gray-100 text-gray-400' : 'bg-green-100 text-green-700'"
                            x-text="story.read ? 'Read' : 'New'"></span>
                    </div>
                </a>
            </template>
        </div>
    </div>

</body>

</html>
